// Spread loot across floor using a grid to avoid clumping
const GRID_COLS = 6, GRID_ROWS = 4;
function randSafeFloor(margin=36, existingItems=[], playerPos=null, minGrids=2.5) {
  // Build list of grid cells and pick one that's least occupied
  const cellW = (FLOOR.w - margin*2) / GRID_COLS;
  const cellH = (FLOOR.h - margin*2) / GRID_ROWS;
  const minPlayerDist = Math.min(cellW, cellH) * minGrids;
  const cells = [];
  for(let r=0;r<GRID_ROWS;r++){
    for(let c=0;c<GRID_COLS;c++){
      const cx = FLOOR.x + margin + c*cellW + cellW/2 + (Math.random()-0.5)*cellW*0.5;
      const cy = FLOOR.y + margin + r*cellH + cellH/2 + (Math.random()-0.5)*cellH*0.5;
      const tooClose = playerPos && Math.sqrt((cx-playerPos.x)**2+(cy-playerPos.y)**2)<minPlayerDist;
      if(!tooClose && NO_SPAWN_ZONES.every(z=>cx<z.x||cx>z.x+z.w||cy<z.y||cy>z.y+z.h)){
        // Count how many existing items are near this cell
        const nearby = existingItems.filter(f=>Math.sqrt((f.x-cx)**2+(f.y-cy)**2)<80).length;
        cells.push({x:cx,y:cy,nearby});
      }
    }
  }
  if(cells.length===0) return {x:FLOOR.x+280+Math.random()*80,y:FLOOR.y+140+Math.random()*60};
  // Sort by least occupied and pick from the least-clumped third
  cells.sort((a,b)=>a.nearby-b.nearby);
  const pool = cells.slice(0, Math.max(1, Math.ceil(cells.length/3)));
  return pool[Math.floor(Math.random()*pool.length)];
}
function randFloor(margin=60) {
  return {x:FLOOR.x+margin+Math.random()*(FLOOR.w-margin*2),y:FLOOR.y+margin+Math.random()*(FLOOR.h-margin*2)};
}
function getWbState(wb) {
  if(wb>=80)return 5; if(wb>=60)return 4; if(wb>=40)return 3; if(wb>=20)return 2; return 1;
}
function effectiveSpeed(pts, wbState, speedMod) {
  const ef = 0.35 + Math.max(0,pts/TOTAL_POINTS)*0.65;
  let spd = BASE_SPEED * WB[wbState].spd * speedMod * ef;
  if(wbState<=SLOW_MOOD_THRESHOLD && pts<LOW_ENERGY_THRESHOLD) spd *= 0.65;
  return spd;
}
// Order reward based on flower count
function orderReward(colorCount) {
  if(colorCount>=4) return 0.50;
  if(colorCount>=3) return 0.35;
  return 0.25;
}
// Carry-over energy — always persists to next day

  const isSC=item.type==="snack"||item.type==="water";

  const isJournal=item.type==="journal";
  const gc=isSC?"rgba(52,211,153,0.95)":isTC?"rgba(239,68,68,0.95)":isJournal?"rgba(234,179,8,0.95)":"rgba(244,114,182,0.85)";

    ?"radial-gradient(circle,rgba(52,211,153,0.55) 0%,rgba(52,211,153,0.15) 55%,transparent 75%)"

  const emojiSize=isJournal?44:isSC?22:isTC?17:21;

  return (
    <div style={{position:"absolute",left:item.x-offset,top:item.y-offset,width:containerSize,height:containerSize,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",pointerEvents:"none",zIndex:6,opacity:op}}>

function pickCustomerType(excludeType=null) {
  // weighted pool — elise is rare, nathan/ellen come up often
  const pool = ["elise","nathan","ellen","ellen","erica","erica","michael","michael","nathan"].filter(t=>t!==excludeType);
  return pool[Math.floor(Math.random()*pool.length)];
}

const FLOWER_ACTIVITIES = [
  "a first date", "my mom", "a birthday present", "romance", "my friend",
  // "themselves" is replaced dynamically using customer gender
];

// Returns activity string, substituting pronouns for gendered tokens
function getActivity(baseActivity, gender) {
  if(baseActivity==="themselves") return gender==="m"?"himself":"herself";
  if(baseActivity==="mom") return gender==="m"?"his mom":"her mom";
  return baseActivity;
}

// Pool — "themselves" and "mom" are pronoun tokens resolved via getActivity
const ACTIVITY_POOL = [
  "a date", "mom", "a birthday present", "romance", "my friend", "themselves", "an important work thing",
];

function orderPatience(basePatience, flowerCount) {
  if(flowerCount>=4) return basePatience+8;
  if(flowerCount>=3) return basePatience+4;
  return basePatience;
}

function makeCustomer(id, qIdx, threeFlowerRate=0, excludeType=null, maxFlowers=4, fourFlowerRate=null) {
  const roll = Math.random();
  let n;
  const fr4 = fourFlowerRate !== null ? fourFlowerRate : threeFlowerRate * 0.25;
  if(maxFlowers >= 4 && roll < fr4) n = 4;
  else if(roll < fr4 + threeFlowerRate) n = 3;
  else n = 2;
  const colors=[...FKEYS].sort(()=>Math.random()-0.5).slice(0,n);
  const type = pickCustomerType(excludeType);
  const cfg = CUSTOMERS[type];
  const rawActivity = ACTIVITY_POOL[Math.floor(Math.random()*ACTIVITY_POOL.length)];
  const activity = getActivity(rawActivity, cfg.gender);
  return {
    id, colors, order:{id,colors},
    x:ENTER_X, y:ENTER_Y,
    tx:QUEUE_START.x+qIdx*QUEUE_STEP, ty:QUEUE_START.y,
    state:"approaching", patience:0,
    bouquet:null,
    customerType: type,
    customerName: cfg.name,
    customerColor: cfg.color,
    activity,
  };
}

  if(screen==="win")return(
    <div style={{...sharedStyle,background:"linear-gradient(135deg,#fdf2f8,#fce7f3,#ede9fe)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",position:"relative",overflow:"hidden"}}>

  // ── GAME WORLD ─────────────────────────────────────────────────────────────
  return(
    <div style={{...sharedStyle,position:"relative",overflow:"hidden",userSelect:"none"}} tabIndex={0} onClick={()=>setShowSettings(false)}>

      <svg style={{position:"absolute",inset:0,opacity:0.03}} width={W} height={H}>

          <CustFig id={c.id} state={c.state} customerColor={c.customerColor} customerName={c.customerName} isAtCounter={c.state==="accepted"} customerType={c.customerType}/>
          <div style={{background:c.state==="accepted"?"rgba(240,253,244,0.97)":"rgba(255,255,255,0.92)",border:c.state==="accepted"?`2px solid #4ade80`:`1.5px solid ${c.customerColor||"#fda4af"}`,borderRadius:8,padding:"3px 7px",minWidth:40,textAlign:"center",boxShadow:c.state==="accepted"?"0 0 8px rgba(74,222,128,0.4)":"none"}}>
            {c.state==="accepted"?<div style={{display:"flex",gap:2,fontSize:12}}>{c.colors.map(col=>(<span key={col}>{FLOWERS[col].emoji}</span>))}</div>:<div style={{fontSize:10,color:"#9ca3af"}}>? ?</div>}
            {c.state==="impatient"&&<div style={{fontSize:7,color:"#ef4444",textAlign:"center",marginTop:1}}>impatient!</div>}
          </div>
        </div>
      ))}

      <svg style={{position:"absolute",inset:0,pointerEvents:"none",zIndex:7}} width={W} height={H}>
        {movingCusts.map(c=><CustomerWalking key={c.id} c={c}/>)}
      </svg>
      {lootItems.map(f=>(<LootItem key={f.id} item={f} isNear={nearObj===`loot_${f.id}`}/>))}
      {snackItem&&<LootItem item={snackItem} isNear={nearObj==="snack"}/>}
      {waterItem&&<LootItem item={waterItem} isNear={nearObj==="water"}/>}
      {tcWarn1&&<div style={{position:"absolute",left:tcWarn1.x-22,top:tcWarn1.y-22,width:44,height:44,borderRadius:"50%",background:"rgba(239,68,68,0.18)",border:"2px solid rgba(239,68,68,0.45)",pointerEvents:"none",zIndex:5,animation:"truecrime-pulse 0.4s ease-in-out infinite"}}/>}
      {tcWarn2&&<div style={{position:"absolute",left:tcWarn2.x-22,top:tcWarn2.y-22,width:44,height:44,borderRadius:"50%",background:"rgba(239,68,68,0.18)",border:"2px solid rgba(239,68,68,0.45)",pointerEvents:"none",zIndex:5,animation:"truecrime-pulse 0.4s ease-in-out infinite"}}/>}
      {trueCrimeItem&&<LootItem item={trueCrimeItem} isNear={nearObj==="truecrime"}/>}
      {trueCrimeItem2&&<LootItem item={trueCrimeItem2} isNear={false}/>}
      {journalItem&&<LootItem item={journalItem} isNear={nearObj==="journal"}/>}

      <svg style={{position:"absolute",inset:0,pointerEvents:"none",zIndex:7}} width={W} height={H}>
        <FriendFig x={friendPos.x} y={friendPos.y} facing={friendFacing} walking={friendWalking} walkFrame={friendWalkFrame} photoSrc={FRIEND_PHOTOS_BY_DAY[Math.min(day,5)-1]} isSick={day===4}/>
        {nearObj==="friend"&&!friendBubble&&(
          <g transform={`translate(${friendPos.x+26},${friendPos.y-28})`}>
            <rect x="0" y="0" width="108" height="20" rx="6" fill="white" stroke={day===4?"#ef4444":"#c084fc"} strokeWidth="1.5"/>
            <polygon points="0,7 -7,12 0,17" fill="white" stroke={day===4?"#ef4444":"#c084fc"} strokeWidth="1.5" strokeLinejoin="round"/>
            <text x="7" y="14" fontSize="8" fill={day===4?"#b91c1c":"#7e22ce"} fontFamily="Georgia,serif">
              {day===4?"SPACE (sick! −1⚡)":friendChats>=4?"SPACE (−½⚡ over limit)":"SPACE (+½ energy, free)"}
            </text>
          </g>
        )}
        {/* Chat counter — hidden on Day 4 */}
        {day!==4&&<g transform={`translate(${friendPos.x-8},${friendPos.y-14})`}>
          {[0,1,2,3].map(i=>(
            <circle key={i} cx={i*7} cy={0} r="2.8"
              fill={i<friendChats?(friendChats>4?"#ef4444":"#c084fc"):"#e5e7eb"}
              stroke="white" strokeWidth="0.8"
            />
          ))}
        </g>}
      </svg>
      {friendBubble&&(
        <div style={{position:"absolute",left:Math.min(W-220,Math.max(10,friendPos.x+30)),top:Math.max(60,friendPos.y-72),background:"white",border:`2px solid ${friendBubble.overchat?"#f59e0b":isLowEnergy?"#3b82f6":"#c084fc"}`,borderRadius:14,padding:"9px 13px",boxShadow:`0 4px 20px ${friendBubble.overchat?"rgba(245,158,11,0.3)":isLowEnergy?"rgba(59,130,246,0.3)":"rgba(192,132,252,0.3)"}`,maxWidth:210,zIndex:25,animation:"bubble-in 0.25s ease-out",pointerEvents:"none"}}>
          <div style={{position:"absolute",bottom:-10,left:20,width:0,height:0,borderLeft:"8px solid transparent",borderRight:"8px solid transparent",borderTop:`10px solid ${friendBubble.overchat?"#f59e0b":isLowEnergy?"#3b82f6":"#c084fc"}`}}/>
          <div style={{position:"absolute",bottom:-8,left:21,width:0,height:0,borderLeft:"7px solid transparent",borderRight:"7px solid transparent",borderTop:"9px solid white"}}/>
          <div style={{fontSize:11,color:friendBubble.overchat?"#92400e":isLowEnergy?"#1d4ed8":"#4c1d95",lineHeight:1.6,fontStyle:"italic"}}>"{friendBubble.msg}"</div>
        </div>
      )}

      {/* PLAYER */}
      <div style={{position:"absolute",left:pos.x,top:pos.y,zIndex:10,filter:nearObj&&!sleeping&&!isEating&&!isDrinking?"drop-shadow(0 0 6px rgba(244,114,182,0.75))":"drop-shadow(0 2px 3px rgba(0,0,0,0.12))"}}>
        <Char state={wState} facing={facing} walking={walking&&!sleeping&&!isEating&&!isDrinking} walkFrame={walkFrame} size={CHAR_H} sleeping={sleeping}/>

        {/* Bouquet bubble — only when not eating/drinking */}
        {bouquet.length>0&&!sleeping&&!isEating&&!isDrinking&&(
          <div style={{position:"absolute",bottom:"108%",left:"50%",transform:"translateX(-50%)",background:"rgba(255,255,255,0.97)",borderRadius:9,padding:"3px 7px",boxShadow:"0 2px 12px rgba(244,114,182,0.25)",border:"1.5px solid rgba(244,114,182,0.4)",display:"flex",gap:3,alignItems:"center",whiteSpace:"nowrap",zIndex:20}}>
            {bouquet.map(c=><span key={c} style={{fontSize:14}}>{FLOWERS[c].emoji}</span>)}
            {currentOrder?.colors.filter(c=>!bouquet.includes(c)).map(c=><span key={c} style={{fontSize:14,opacity:0.28}}>{FLOWERS[c].emoji}</span>)}
          </div>
        )}

        {/* Eating animation */}
        {isEating&&!sleeping&&(
          <div style={{position:"absolute",bottom:"108%",left:"50%",transform:"translateX(-50%)",display:"flex",flexDirection:"column",alignItems:"center",gap:2,zIndex:20}}>
            <span style={{fontSize:22,animation:"eat-bounce 0.5s ease-in-out infinite"}}>🥚</span>
            <div style={{fontSize:8,color:"#065f46",fontWeight:"bold",background:"rgba(209,250,229,0.95)",borderRadius:6,padding:"1px 6px",whiteSpace:"nowrap"}}>Eating... +2⚡</div>
          </div>
        )}

        {/* Drinking animation */}
        {isDrinking&&!sleeping&&(
          <div style={{position:"absolute",bottom:"108%",left:"50%",transform:"translateX(-50%)",display:"flex",flexDirection:"column",alignItems:"center",gap:2,zIndex:20}}>
            <span style={{fontSize:22,animation:"drink-tilt 0.6s ease-in-out infinite"}}>💧</span>
            <div style={{fontSize:8,color:"#1d4ed8",fontWeight:"bold",background:"rgba(219,234,254,0.95)",borderRadius:6,padding:"1px 6px",whiteSpace:"nowrap"}}>Drinking... +1⚡</div>
          </div>
        )}

        {/* Status labels below avatar */}
        {isMoodSlowed&&!sleeping&&!isEating&&!isDrinking&&<div style={{position:"absolute",top:"108%",left:"50%",transform:"translateX(-50%)",fontSize:8,color:"#a16207",fontWeight:"bold",animation:"energy-warn 1s infinite",whiteSpace:"nowrap",background:"rgba(254,249,195,0.95)",borderRadius:5,padding:"2px 6px",border:"1px solid #fde047",zIndex:20}}>😐 Slowing down — need energy!</div>}
        {isZeroEnergy&&!sleeping&&!isMoodSlowed&&!isEating&&!isDrinking&&<div style={{position:"absolute",top:"108%",left:"50%",transform:"translateX(-50%)",fontSize:8,color:"#7f1d1d",fontWeight:"bold",animation:"energy-warn 0.5s infinite",whiteSpace:"nowrap",background:"rgba(254,226,226,0.95)",borderRadius:5,padding:"2px 6px",border:"1px solid #fca5a5",zIndex:20}}>😵 Exhausted</div>}
        {isLowEnergy&&!isZeroEnergy&&!sleeping&&!isMoodSlowed&&!isEating&&!isDrinking&&<div style={{position:"absolute",top:"108%",left:"50%",transform:"translateX(-50%)",fontSize:8,color:"#ef4444",fontWeight:"bold",animation:"energy-warn 0.8s infinite",whiteSpace:"nowrap",background:"rgba(254,226,226,0.85)",borderRadius:5,padding:"2px 6px",zIndex:20}}>⚡ Low energy!</div>}
        {sleeping&&<div style={{position:"absolute",top:-20,left:"50%",transform:"translateX(-50%)",fontSize:9,color:"#60a5fa",fontWeight:"bold",animation:"speed-pulse 0.8s infinite",whiteSpace:"nowrap"}}>💤 Napping...</div>}

        {/* Floating energy deltas — removed */}
      </div>
      </>}

      {/* HUD */}
      <div style={{position:"absolute",top:0,left:0,right:0,height:54,background:"rgba(255,255,255,0.92)",backdropFilter:"blur(10px)",borderBottom:"1px solid rgba(244,114,182,0.2)",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 12px",zIndex:20}}>
        {/* Mood pill — includes wellbeing % */}
        <div style={{display:"flex",alignItems:"center",gap:7,background:moodCfg.moodBg,borderRadius:12,padding:"4px 10px",border:`1.5px solid ${moodCfg.moodColor}44`}}>
          <Char state={wState} facing="right" walking={false} walkFrame={0} size={26}/>
          <div>
            <div style={{fontSize:8,color:"#9ca3af"}}>DAY {day}/{MAX_DAYS} · {lvl.label}</div>
            <div style={{fontSize:12,fontWeight:"bold",color:moodCfg.moodColor,display:"flex",alignItems:"center",gap:4}}>
              <span>{moodCfg.moodEmoji}</span>
              <span>{moodCfg.name}</span>
              <span style={{fontSize:10,fontWeight:"normal",color:moodCfg.moodColor,opacity:0.75}}>· {wellbeing}%</span>
            </div>
          </div>
        </div>
        {/* Energy — 10 circles */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <div style={{display:"flex",gap:3,alignItems:"center"}}>
            {Array.from({length:TOTAL_POINTS},(_,i)=>{
              const fillFraction=Math.max(0,Math.min(1,points-i));
              const filled=fillFraction>=1;
              const partial=fillFraction>0&&fillFraction<1;
              const isLow=i<LOW_ENERGY_THRESHOLD;
              const activeColor=isLow?"#ef4444":"#ec4899";
              const activeBorder=isLow?"#dc2626":"#be185d";
              const bg=filled?activeColor
                :partial?`conic-gradient(${activeColor} ${fillFraction*360}deg,rgba(0,0,0,0.08) 0deg)`
                :"rgba(0,0,0,0.08)";
              return(
                <div key={i} style={{
                  width:17,height:17,borderRadius:"50%",
                  background:bg,
                  border:`1.5px solid ${filled||partial?activeBorder:"rgba(0,0,0,0.12)"}`,
                  transition:"background 0.15s",
                  boxShadow:filled&&!isLow?"0 0 4px rgba(236,72,153,0.4)":filled&&isLow?"0 0 4px rgba(239,68,68,0.5)":"none",
                }}/>
              );
            })}
          </div>
          <div style={{fontSize:10,color:isZeroEnergy?"#7f1d1d":isLowEnergy?"#ef4444":"#374151",animation:isLowEnergy?"energy-warn 0.8s infinite":"none",fontWeight:"bold"}}>
            {isZeroEnergy?"😵 exhausted":isLowEnergy?"⚡ low energy":`⚡ ${Math.round(points)}/10`}
          </div>
        </div>
        {/* Orders + timer + settings */}
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:"bold",color:ordersToday>=lvl.minOrders?"#22c55e":"#f59e0b",lineHeight:1}}>{ordersToday}<span style={{fontSize:13,color:"#9ca3af",fontWeight:"normal"}}>/{lvl.minOrders}</span></div>
            <div style={{fontSize:8,color:"#9ca3af"}}>orders</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:"bold",color:timerColor,fontFamily:"monospace",lineHeight:1}}>{timeLeft}s</div>
            <div style={{fontSize:8,color:"#9ca3af"}}>time</div>
          </div>
          {/* Settings dropdown */}
          <div style={{position:"relative"}} onClick={e=>e.stopPropagation()}>
            <button onClick={()=>setShowSettings(s=>!s)} style={{background:"rgba(255,255,255,0.8)",border:"1.5px solid #e5e7eb",borderRadius:8,padding:"4px 9px",fontSize:14,cursor:"pointer",lineHeight:1}}>⚙️</button>
            {showSettings&&(
              <div style={{position:"absolute",right:0,top:"calc(100% + 6px)",background:"white",borderRadius:12,boxShadow:"0 4px 20px rgba(0,0,0,0.15)",border:"1px solid #e5e7eb",zIndex:40,overflow:"hidden",minWidth:130}}>
                <button onClick={togglePause} style={{display:"block",width:"100%",padding:"10px 16px",textAlign:"left",background:"transparent",border:"none",cursor:"pointer",fontSize:12,color:"#374151",fontFamily:"Georgia,serif",borderBottom:"1px solid #f3f4f6"}}>
                  {paused?"▶ Resume":"⏸ Pause"}
                </button>
                <button onClick={restartGame} style={{display:"block",width:"100%",padding:"10px 16px",textAlign:"left",background:"transparent",border:"none",cursor:"pointer",fontSize:12,color:"#ef4444",fontFamily:"Georgia,serif"}}>
                  🔄 Restart game
                </button>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* BED BUTTON */}
      {!paused&&<button onClick={()=>{if(nearObj==="bed"&&!sleeping)startNap();}} style={{position:"absolute",left:BED.x,top:BED.y+BED.h+4,zIndex:20,background:sleeping?"#dbeafe":nearObj==="bed"?"#eff6ff":"rgba(255,255,255,0.75)",border:sleeping?"2px solid #3b82f6":nearObj==="bed"?"2px solid #3b82f6":"2px solid rgba(147,197,253,0.5)",borderRadius:10,padding:"5px 10px",display:"flex",alignItems:"center",gap:5,fontSize:10,color:sleeping||nearObj==="bed"?"#1d4ed8":"#64748b",fontFamily:"Georgia,serif",cursor:nearObj==="bed"&&!sleeping?"pointer":"default",transition:"all 0.15s",backdropFilter:"blur(4px)"}}>
        <span style={{fontSize:13}}>🛏️</span>
        <span style={{fontWeight:"bold"}}>{sleeping?`Zzz (${Math.round(napProgress)}%)`:`Nap (+${NAP_ENERGY}⚡)`}</span>
      </button>}

      {/* Controls */}
      {!paused&&<div style={{position:"absolute",bottom:12,right:12,display:"flex",gap:4,zIndex:15}}>
        {[["↑↓←→","move"],["SPACE","interact"],["ESC","pause"]].map(([k,l])=>(<div key={k} style={{background:"rgba(255,255,255,0.68)",backdropFilter:"blur(4px)",borderRadius:5,padding:"2px 7px",fontSize:7,color:"#6b7280",border:"1px solid rgba(0,0,0,0.06)",fontFamily:"monospace"}}><strong>{k}</strong> {l}</div>))}
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<BloomGame/>);
</script>
</body>
</html>
